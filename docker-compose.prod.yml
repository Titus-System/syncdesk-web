services:
  syncdesk-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
        VITE_APP_NAME: ${VITE_APP_NAME}
    image: syncdesk-web:latest
    container_name: syncdesk_web
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      TZ: America/Sao_Paulo
